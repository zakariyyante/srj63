<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lgOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="lgViolet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="lgShield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#150d20"/>
    </linearGradient>
  </defs>

  <!-- Shield icon -->
  <path d="M40 4 L68 14 L68 40 C68 56 56 68 40 74 C24 68 12 56 12 40 L12 14 Z"
        fill="url(#lgShield)" stroke="url(#lgOrange)" stroke-width="2"/>
  <!-- Lightning bolt -->
  <path d="M45 8 L27 40 L38 40 L35 68 L53 36 L42 36 Z" fill="url(#lgOrange)"/>
  <!-- UK cross box -->
  <rect x="52" y="52" width="16" height="16" rx="3" fill="url(#lgViolet)"/>
  <rect x="57" y="52" width="5" height="16" fill="#fb923c"/>
  <rect x="52" y="57" width="16" height="5" fill="#fb923c"/>

  <!-- "Instant" text -->
  <text x="90" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" fill="#f97316">Instant</text>
  <!-- "UK" text -->
  <text x="228" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" fill="#a78bfa">UK</text>
  <!-- "Casinos" text -->
  <text x="268" y="38" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900" fill="#ffffff">Casinos</text>
  <!-- Domain sub-text -->
  <text x="90" y="58" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#7c3aed" letter-spacing="3">INSTANTUKCASINOS.ORG</text>
</svg>
